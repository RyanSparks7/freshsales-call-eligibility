<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Call Eligibility Checker — AutoDealers Digital</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0f2f5;
      color: #1a1a2e;
      min-height: 100vh;
    }

    header {
      background: #1a1a2e;
      color: white;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    header h1 { font-size: 1.2rem; font-weight: 600; }
    header span { font-size: 0.85rem; color: #a0aec0; }

    .container {
      max-width: 760px;
      margin: 32px auto;
      padding: 0 16px;
    }

    /* Rep Info Panel */
    .rep-panel {
      background: white;
      border-radius: 12px;
      padding: 20px 24px;
      margin-bottom: 24px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    .rep-panel h2 {
      font-size: 0.95rem;
      font-weight: 600;
      color: #4a5568;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 16px;
    }

    .rep-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 14px;
    }

    .field label {
      display: block;
      font-size: 0.8rem;
      font-weight: 500;
      color: #718096;
      margin-bottom: 6px;
    }

    .field input[type="number"],
    .field select {
      width: 100%;
      padding: 8px 12px;
      border: 1.5px solid #e2e8f0;
      border-radius: 8px;
      font-size: 0.9rem;
      background: #f7fafc;
      color: #1a1a2e;
      transition: border-color 0.2s;
    }

    .field input:focus,
    .field select:focus {
      outline: none;
      border-color: #4361ee;
      background: white;
    }

    /* Search Panel */
    .search-panel {
      background: white;
      border-radius: 12px;
      padding: 20px 24px;
      margin-bottom: 24px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    .search-row {
      display: flex;
      gap: 10px;
    }

    .search-row input {
      flex: 1;
      padding: 10px 16px;
      border: 1.5px solid #e2e8f0;
      border-radius: 8px;
      font-size: 0.95rem;
      background: #f7fafc;
      transition: border-color 0.2s;
    }

    .search-row input:focus {
      outline: none;
      border-color: #4361ee;
      background: white;
    }

    .btn-search {
      padding: 10px 22px;
      background: #4361ee;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .btn-search:hover { background: #3451d1; }
    .btn-search:disabled { background: #a0aec0; cursor: not-allowed; }

    .search-hint {
      font-size: 0.78rem;
      color: #a0aec0;
      margin-top: 8px;
    }

    /* Results */
    #results { display: flex; flex-direction: column; gap: 14px; }

    .result-card {
      background: white;
      border-radius: 12px;
      padding: 20px 24px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      border-left: 5px solid #e2e8f0;
    }

    .result-card.callable    { border-left-color: #48bb78; }
    .result-card.not-allowed { border-left-color: #fc5c65; }
    .result-card.manager     { border-left-color: #f6ad55; }
    .result-card.check       { border-left-color: #63b3ed; }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 12px;
    }

    .card-name {
      font-size: 1.05rem;
      font-weight: 700;
      color: #1a1a2e;
    }

    .card-company {
      font-size: 0.85rem;
      color: #718096;
      margin-top: 2px;
    }

    .eligibility-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 0.82rem;
      font-weight: 700;
      white-space: nowrap;
    }

    .badge-callable    { background: #f0fff4; color: #276749; }
    .badge-not-allowed { background: #fff5f5; color: #9b2c2c; }
    .badge-manager     { background: #fffaf0; color: #7b341e; }
    .badge-check       { background: #ebf8ff; color: #2c5282; }

    .card-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      font-size: 0.82rem;
      color: #718096;
      margin-bottom: 12px;
    }

    .card-meta span { display: flex; align-items: center; gap: 4px; }

    .card-reason {
      font-size: 0.85rem;
      color: #4a5568;
      background: #f7fafc;
      border-radius: 8px;
      padding: 10px 14px;
      line-height: 1.5;
    }

    /* Status label */
    .status-label {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: capitalize;
    }

    .status-active    { background: #f0fff4; color: #276749; }
    .status-canceled  { background: #fff5f5; color: #9b2c2c; }
    .status-suspended { background: #fffaf0; color: #7b341e; }
    .status-unknown   { background: #f7fafc; color: #718096; }

    /* Loading / empty states */
    .state-msg {
      text-align: center;
      color: #a0aec0;
      font-size: 0.9rem;
      padding: 32px 0;
    }

    .spinner {
      display: inline-block;
      width: 18px; height: 18px;
      border: 2px solid #e2e8f0;
      border-top-color: #4361ee;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .error-msg {
      background: #fff5f5;
      color: #9b2c2c;
      border-radius: 8px;
      padding: 14px 18px;
      font-size: 0.88rem;
    }
  </style>
</head>
<body>

<header>
  <div>
    <h1>Call Eligibility Checker</h1>
    <span>AutoDealers Digital — Internal Sales Tool</span>
  </div>
</header>

<div class="container">

  <!-- Rep Info -->
  <div class="rep-panel">
    <h2>Rep Information</h2>
    <div class="rep-grid">
      <div class="field">
        <label>Tenure (years)</label>
        <input type="number" id="tenure" min="0" step="0.5" placeholder="e.g. 1.5" />
      </div>
      <div class="field">
        <label>Received a Raise?</label>
        <select id="has_raise">
          <option value="">-- Select --</option>
          <option value="yes">Yes</option>
          <option value="no">No</option>
        </select>
      </div>
      <div class="field">
        <label>Retention Training Done?</label>
        <select id="retention_training">
          <option value="">-- Select --</option>
          <option value="yes">Yes</option>
          <option value="no">No</option>
        </select>
      </div>
      <div class="field">
        <label>Team Lead Approval?</label>
        <select id="team_lead_approval">
          <option value="">-- Select --</option>
          <option value="yes">Yes</option>
          <option value="no">No</option>
        </select>
      </div>
    </div>
  </div>

  <!-- Search -->
  <div class="search-panel">
    <div class="search-row">
      <input
        type="text"
        id="search-input"
        placeholder="Search by dealership name, phone, or email..."
        autocomplete="off"
      />
      <button class="btn-search" id="search-btn" onclick="doSearch()">Search</button>
    </div>
    <p class="search-hint">Enter a name, email address, or phone number to look up in Freshsales.</p>
  </div>

  <!-- Results -->
  <div id="results"></div>

</div>

<script>
  // ── Config ──────────────────────────────────────────────────────────────────
  // Change this to your deployed backend URL when on Railway/Render
  const BACKEND_URL = 'http://localhost:3000';

  // ── Search ──────────────────────────────────────────────────────────────────
  document.getElementById('search-input').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') doSearch();
  });

  async function doSearch() {
    const query = document.getElementById('search-input').value.trim();
    if (!query) return;

    const rep = getRepInfo();
    if (!rep) return;

    const btn = document.getElementById('search-btn');
    const resultsEl = document.getElementById('results');

    btn.disabled = true;
    resultsEl.innerHTML = `<p class="state-msg"><span class="spinner"></span>Searching Freshsales...</p>`;

    try {
      const res = await fetch(`${BACKEND_URL}/api/search`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ query, rep }),
      });

      const data = await res.json();

      if (!res.ok) {
        resultsEl.innerHTML = `<div class="error-msg">Error: ${data.error || 'Something went wrong.'}</div>`;
        return;
      }

      if (!data.results || data.results.length === 0) {
        resultsEl.innerHTML = `<p class="state-msg">No contacts or accounts found for "<strong>${escHtml(query)}</strong>".</p>`;
        return;
      }

      resultsEl.innerHTML = data.results.map(renderCard).join('');
    } catch (err) {
      resultsEl.innerHTML = `<div class="error-msg">Could not reach the server. Make sure the backend is running.<br><small>${err.message}</small></div>`;
    } finally {
      btn.disabled = false;
    }
  }

  // ── Rep Info ────────────────────────────────────────────────────────────────
  function getRepInfo() {
    const tenure = document.getElementById('tenure').value;
    const has_raise = document.getElementById('has_raise').value;
    const retention_training = document.getElementById('retention_training').value;
    const team_lead_approval = document.getElementById('team_lead_approval').value;

    if (tenure === '') {
      alert('Please enter your tenure (years) before searching.');
      return null;
    }
    if (!has_raise || !retention_training || !team_lead_approval) {
      alert('Please fill in all rep info fields before searching.');
      return null;
    }

    return {
      tenure_years: parseFloat(tenure),
      has_raise: has_raise === 'yes',
      retention_training: retention_training === 'yes',
      team_lead_approval: team_lead_approval === 'yes',
    };
  }

  // ── Render Card ─────────────────────────────────────────────────────────────
  function renderCard(r) {
    const e = r.eligibility;
    const decision = e.decision;

    let cardClass = 'check';
    let badgeClass = 'badge-check';

    if (decision === 'CALLABLE')              { cardClass = 'callable';    badgeClass = 'badge-callable'; }
    else if (decision === 'NOT ALLOWED')      { cardClass = 'not-allowed'; badgeClass = 'badge-not-allowed'; }
    else if (decision === 'NEEDS MANAGER APPROVAL') { cardClass = 'manager'; badgeClass = 'badge-manager'; }

    const statusClass = statusCssClass(r.account_status);
    const statusLabel = r.account_status
      ? `<span class="status-label ${statusClass}">${escHtml(r.account_status)}</span>`
      : `<span class="status-label status-unknown">unknown</span>`;

    const metaParts = [];
    if (r.email) metaParts.push(`<span>✉️ ${escHtml(r.email)}</span>`);
    if (r.phone) metaParts.push(`<span>📞 ${escHtml(r.phone)}</span>`);
    if (e.days_since_cancellation !== undefined)
      metaParts.push(`<span>📅 ${e.days_since_cancellation} days since cancellation</span>`);

    return `
      <div class="result-card ${cardClass}">
        <div class="card-header">
          <div>
            <div class="card-name">${escHtml(r.name || r.company || 'Unknown')}</div>
            ${r.company && r.type === 'contact' ? `<div class="card-company">${escHtml(r.company)}</div>` : ''}
          </div>
          <div style="display:flex;align-items:center;gap:8px;flex-shrink:0;">
            ${statusLabel}
            <span class="eligibility-badge ${badgeClass}">${e.icon} ${escHtml(decision)}</span>
          </div>
        </div>
        ${metaParts.length ? `<div class="card-meta">${metaParts.join('')}</div>` : ''}
        <div class="card-reason">${escHtml(e.reason)}</div>
      </div>
    `;
  }

  // ── Helpers ─────────────────────────────────────────────────────────────────
  function statusCssClass(status) {
    if (!status) return 'status-unknown';
    const s = status.toLowerCase();
    if (s === 'active') return 'status-active';
    if (s === 'canceled' || s === 'cancelled') return 'status-canceled';
    if (s === 'suspended') return 'status-suspended';
    return 'status-unknown';
  }

  function escHtml(str) {
    if (!str) return '';
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }
</script>
</body>
</html>
